name: Nix

on:
  workflow_call:

jobs:
  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/flakehub-cache-action@v3

      - name: Flake check
        run: nix flake check

      - name: Build
        run: nix build .#default
